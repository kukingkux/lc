## Settings file was created by plugin Camera Overhaul v1.1.0
## Plugin GUID: com.seeya.cameraoverhaul

[1. General]

## Scales every effect.
# Setting type: Single
# Default value: 1
# Acceptable value range: From 0 to 3
MasterStrength = 1

## How smoothly tuning blends when your movement context changes.
# Setting type: Single
# Default value: 0.1
# Acceptable value range: From 0 to 1
ContextTransitionSmoothing = 0.1

## Safety cap on speed-driven roll so very high speeds can't fling the view.
# Setting type: Single
# Default value: 12
# Acceptable value range: From 0 to 90
MaxVelocityRoll = 12

## Safety cap on speed-driven pitch so very high speeds can't fling the view.
# Setting type: Single
# Default value: 10
# Acceptable value range: From 0 to 90
MaxVelocityPitch = 10

