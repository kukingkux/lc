## Settings file was created by plugin loaforcsSoundAPI v2.0.12
## Plugin GUID: me.loaforc.soundapi

[Advanced]

## Should SoundAPI spoof the return value of AudioSource.clip? This improves compatibility in most edge cases.
# Setting type: Boolean
# Default value: true
AudioClipSpoofing = true

## What backend should SoundAPI try to use? You should only use this option if you know what it means. Note: NativeBackend needs to be supported on a per unity version basis, if the current version is not supported it will fallback to the old HarmonyX backend automatically.
# Setting type: Backend
# Default value: NativeBackend
# Acceptable values: HarmonyX, NativeBackend
PreferredBackend = NativeBackend

[Developer]

## While true SoundAPI will generate a json and markdown file per session that records information SoundAPI and related mods find.
# Setting type: Boolean
# Default value: false
