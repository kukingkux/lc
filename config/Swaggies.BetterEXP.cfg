[General]

## Whether to show a breakdown of your EXP gains at the end of each day. Doesn't affect gameplay.
# Setting type: Boolean
# Default value: false
Show Round Summary = false

## Whether to show your current BetterEXP rank in the pause menu. Doesn't affect gameplay, but could conflict or overlap with other elements from other mods.
# Setting type: Boolean
# Default value: true
Show Rank In Pause Menu = true

## Saves each day's performance report, including statistics for the day and each player, into a local JSON file that may be viewed or used later. No data will be collected/uploaded anywhere. Useful for developers who'd want to make something cool involving this.
# Setting type: Boolean
# Default value: false
Enable Day Logging = false

## Label for EXP shown on the XP bar in-game and on the pause menu (like the 'EXP' in '1044 EXP')
# Setting type: String
# Default value: EXP
EXP Label = EXP

## Spams logs with BetterEXP info. Recommended to keep off.
# Setting type: Boolean
# Default value: false
Deep Logging = false

