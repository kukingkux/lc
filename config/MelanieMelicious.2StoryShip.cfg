[Navmesh]

## Overwrite listed moons to regenerate navmesh.
# Setting type: String
# Default value: example1,example2
Navmesh Regen Whitelist = example1,example2

## Overwrite listed moons to not regenerate navmesh.
# Setting type: String
# Default value: 62 Lithium,42 Cosmocos,25 Fission-C
Navmesh Regen Blacklist = 62 Lithium,42 Cosmocos,25 Fission-C

## Should this mod force enemy navmesh regeneration when vanilla doesn't? (May cause significantly longer moon loading on land, when activated.)
# Setting type: Boolean
# Default value: false
Navmesh Regen Default = false

## Toggles janky fix for enemies being unable to reach certain areas with the wider 2-story ship (more balanced, potentially less immersive).
# Setting type: Boolean
# Default value: false
Inner Balcony Nerf = false

## Adjust enemies able to climb towards the roof.
# Setting type: navArea
# Default value: Default
# Acceptable values: Default, AllEnemies, SomeEnemies, NoEnemies
Enemy Ladder Climbing = Default

Regenerate Navmesh = true

[Ship Expansion]

## Toggles the addition of a third floor! (crazy)
# Setting type: Boolean
# Default value: false
Enable Third Floor = false

## Toggles extending the front catwalk. (Outside decoration WOW!)
# Setting type: Boolean
# Default value: false
Enable Extended Front Porch = false

## I AM NOT RESPONSIBLE FOR ANY SYSTEM OVERHEATS OR OTHER ISSUES IF YOU DECIDE TO PUT INTEGER LIMIT. Only works with third floor enabled. Toggle how many extra floors, past the 3-story ship, is added.
# Setting type: Int32
# Default value: 0
INFINITE STORY SHIP (requires 3rd story enabled) = 0

